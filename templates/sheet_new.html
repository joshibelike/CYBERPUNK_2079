{% extends "base.html" %}

{% block content %}
<div class="profile-card" style="max-width: 500px; margin: 2rem auto;">
    <h2>Создание нового персонажа</h2>
    <form method="post" class="cyber-form">
        <label>Имя персонажа</label>
        <input type="text" name="name" required placeholder="Введите имя">
        <button type="submit" class="cyber-button">Создать</button>
    </form>
</div>
{% endblock %}
